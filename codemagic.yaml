workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.oneummah.app"
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 22.12.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Use Node 22.12.0 (required by Capacitor CLI)
        script: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install 22.12.0
          nvm use 22.12.0
          node -v
          npm -v

      - name: Download and extract source code
        script: |
          set -e
          rm -rf src
          curl -L -o src.tar.gz "https://yahyeabdirahman1526404989.adaptive.ai/cdn/src.tar.gz"
          tar -xzf src.tar.gz
          rm src.tar.gz

          # Normalize common tar layouts so we end up with ./src/main.tsx
          if [ -d "./src/src" ]; then
            rm -rf ./src
            mv ./src/src ./src
          fi

          echo "=== Verify project files ==="
          ls -la
          ls -la src | head -50
          test -f index.html
          test -f src/main.tsx

      - name: Install npm dependencies (skip postinstall)
        script: |
          npm install --ignore-scripts

      - name: Build production web app
        script: |
          npm run prod:build:vite

      - name: Capacitor sync
        script: |
          npx cap sync ios

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true

      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false # Change to true when ready for production

  ios-development:
    name: iOS Development Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 22.12.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Use Node 22.12.0 (required by Capacitor CLI)
        script: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install 22.12.0
          nvm use 22.12.0
          node -v
          npm -v

      - name: Download and extract source code
        script: |
          set -e
          rm -rf src
          curl -L -o src.tar.gz "https://yahyeabdirahman1526404989.adaptive.ai/cdn/src.tar.gz"
          tar -xzf src.tar.gz
          rm src.tar.gz

          if [ -d "./src/src" ]; then
            rm -rf ./src
            mv ./src/src ./src
          fi

          echo "=== Verify project files ==="
          ls -la
          ls -la src | head -50
          test -f index.html
          test -f src/main.tsx

      - name: Install npm dependencies (skip postinstall)
        script: |
          npm install --ignore-scripts

      - name: Build production web app
        script: |
          npm run prod:build:vite

      - name: Capacitor sync
        script: |
          npx cap sync ios

      - name: Build iOS app (development)
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$HOME/OneUmmah.xcarchive" \
            archive

    artifacts:
      - $HOME/OneUmmah.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
