workflows:
  ios-release:
    name: iOS Release (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.oneummah.app"
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.oneummah.app

    scripts:
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get

      - name: Build iOS IPA (release)
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
