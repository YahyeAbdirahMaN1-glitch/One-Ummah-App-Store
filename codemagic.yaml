workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.oneummah.app"
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Download and extract complete source code
        script: |
          curl -L -o full-source.tar.gz "https://yahyeabdirahman1526404989.adaptive.ai/cdn/one-ummah-full-source.tar.gz"
          tar -xzf full-source.tar.gz --strip-components=1
          rm full-source.tar.gz
          ls -la
          ls -la src/ || echo "src folder missing!"
      
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build production web app
        script: |
          npm run prod:build:vite
      
      - name: Add iOS platform
        script: |
          npx cap add ios
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false # Change to true when ready for production

  ios-development:
    name: iOS Development Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build production web app
        script: |
          npm run prod:build:vite
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
      
      - name: Build iOS app (development)
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$HOME/OneUmmah.xcarchive" \
            archive
    
    artifacts:
      - $HOME/OneUmmah.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
