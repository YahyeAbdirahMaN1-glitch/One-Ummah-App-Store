workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.oneummah.app"
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 22.12.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Download and extract complete source code
        script: |
          curl -L -o full-source.tar.gz "https://yahyeabdirahman1526404989.adaptive.ai/cdn/one-ummah-full-source.tar.gz"
          tar -xzf full-source.tar.gz --strip-components=1
          rm full-source.tar.gz
          echo "✅ Source code downloaded"
      
      - name: Install npm dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install
          echo "✅ npm install complete"
      
      - name: Build production web app
        script: |
          npm run prod:build:vite
          echo "✅ Vite build complete"
      
      - name: Add iOS platform
        script: |
          npx cap add ios
          echo "✅ iOS platform added"
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
          echo "✅ Capacitor sync complete"
      
      - name: Set up code signing
        script: |
          xcode-project use-profiles
          echo "✅ Code signing configured"
      
      - name: Build iOS app
        script: |
          echo "=== Building iOS app ==="
          xcode-project build-ipa \
            --workspace "ios/App/App.xcodeproj/project.xcworkspace" \
            --scheme "App"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  ios-development:
    name: iOS Development Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        PORT: "57079"
        VITE_APP_ID: "Dzne4aH4DFrnxkLb"
        VITE_BASE_URL: "https://one-ummah-yahyeabdirahman1526404989.adaptive.ai"
        VITE_ROOT_URL: "https://adaptive.ai"
        VITE_NODE_ENV: "production"
        VITE_BOX_ID: "MEyXfPBM7yjM9xme"
        VITE_REALTIME_DOMAIN: "rt.acflare.com"
        GUEST_SERVICES_URL: "http://ac1-platform.production.ac1.local:3000/api/services/v2"
        DB_FILE_NAME: "file:production.db"
        QUEUE_DB_FILE_NAME: "production-queue.db"
      node: 22.12.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Download and extract complete source code
        script: |
          curl -L -o full-source.tar.gz "https://yahyeabdirahman1526404989.adaptive.ai/cdn/one-ummah-full-source.tar.gz"
          tar -xzf full-source.tar.gz --strip-components=1
          rm full-source.tar.gz
      
      - name: Install npm dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Build production web app
        script: |
          npm run prod:build:vite
      
      - name: Add iOS platform
        script: |
          npx cap add ios
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
      
      - name: Build iOS app (development)
        script: |
          xcodebuild -workspace "ios/App/App.xcodeproj/project.xcworkspace" \
            -scheme "App" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$HOME/OneUmmah.xcarchive" \
            archive
    
    artifacts:
      - $HOME/OneUmmah.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - yahyeabdirahman1526404989@adaptive.ai
        notify:
          success: true
          failure: true
