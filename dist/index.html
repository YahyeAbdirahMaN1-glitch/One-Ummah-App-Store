    <!-- CRITICAL: Hide Adaptive chat widget for white-label iOS app -->
    <link rel="stylesheet" href="/hide-chat.css" />
    <script type="module" crossorigin src="/assets/index-mwb_VQ28.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-FCz0Oj_V.css">
  </head>
  <body>
    <script>
      // CRITICAL: Block Adaptive chat widget injection - runs FIRST
      (function() {
        // Inject blocking CSS immediately
        const style = document.createElement('style');
        style.id = 'chat-widget-blocker';
        style.textContent = `
          [data-adaptive-chat],
          [data-adaptive-ai],
          [class*="adaptive-chat"],
          [class*="adaptive-ai"],
          iframe[src*="adaptive"],
          iframe[src*="chat"],
          body > div:not(#root)[style*="position: fixed"],
          body > button[style*="position: fixed"],
          body > iframe:not(#root) {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            position: absolute !important;
            left: -999999px !important;
            top: -999999px !important;
            width: 0 !important;
            height: 0 !important;
            z-index: -999999 !important;
          }
        `;
        document.head.appendChild(style);
        
        // Set dark / light mode based on system preference
        const pd = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.body.classList.toggle("dark", pd);
      })();
    </script>
    <div id="root"></div>
  </body>
